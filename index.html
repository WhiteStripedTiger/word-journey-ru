<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Inner Compass</title>
  <meta
    name="description"
    content="A multilingual inner journey web app for word-based self-reflection and AI analysis."
  />

  <link rel="stylesheet" href="style.css" />

  <script src="i18n.js" defer></script>
  <script src="constants.js" defer></script>

  <script src="utils.js" defer></script>
  <script src="state.js" defer></script>
  <script src="journey.js" defer></script>
  <script src="render.js" defer></script>
  <script src="prompt.js" defer></script>
  <script src="app.js" defer></script>
</head>

<body>
  <main id="app" class="app">

    <section id="languageScreen" class="screen active">
      <div class="card hero-card">
        <p class="eyebrow" data-i18n="appName"></p>
        <h1 data-i18n="languageTitle"></h1>
        <p class="lead" data-i18n="languageDescription"></p>

        <div class="language-grid">
          <button class="language-card" data-language="ru">
            <strong>Русский</strong>
            <span>Продолжить на русском</span>
          </button>

          <button class="language-card" data-language="ko">
            <strong>한국어</strong>
            <span>한국어로 계속하기</span>
          </button>

          <button class="language-card" data-language="en">
            <strong>English</strong>
            <span>Continue in English</span>
          </button>
        </div>
      </div>
    </section>

    <section id="introScreen" class="screen">
      <div class="top-controls">
        <select id="languageSelect" class="language-select" aria-label="Language">
          <option value="ru">Русский</option>
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="card hero-card">
        <p class="eyebrow" data-i18n="appName"></p>
        <h1 data-i18n="introTitle"></h1>
        <p class="lead" data-i18n="introDescription"></p>

        <div class="notice">
          <p data-i18n="introNotice1"></p>
          <p data-i18n="introNotice2"></p>
        </div>

        <button id="startBtn" class="btn primary full" data-i18n="startButton"></button>
      </div>
    </section>

    <section id="journeyScreen" class="screen">
      <header class="journey-header">
        <div>
          <p id="stageLabel" class="stage-label"></p>
          <h2 id="stageTitle"></h2>
        </div>

        <button id="resetBtn" class="btn small ghost" data-i18n="resetButton"></button>
      </header>

      <div class="flow-tabs">
        <span id="flowPositive" class="flow-tab active" data-i18n="flowPositive"></span>
        <span id="flowNegative" class="flow-tab" data-i18n="flowNegative"></span>
        <span id="flowOpposite" class="flow-tab" data-i18n="flowOpposite"></span>
        <span id="flowFinal" class="flow-tab" data-i18n="flowFinal"></span>
      </div>

      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <p id="stageDescription" class="stage-description"></p>

      <div class="status-row">
        <div class="status-pill">
          <span id="selectionCounter"></span>
        </div>

        <div class="status-pill muted">
          <span id="timerText">00:00</span>
        </div>
      </div>

      <section id="wordGrid" class="word-grid"></section>

      <section id="oppositePanel" class="opposite-panel hidden">
        <p class="panel-title" data-i18n="oppositePanelTitle"></p>
        <p id="currentNegativeWord" class="current-negative"></p>
        <div id="oppositeOptions" class="opposite-options"></div>
      </section>

      <nav class="bottom-nav">
        <button id="backBtn" class="btn secondary" data-i18n="backButton"></button>
        <button id="nextBtn" class="btn primary" data-i18n="nextButton" disabled></button>
      </nav>
    </section>

    <section id="resultScreen" class="screen">
      <div class="top-controls">
        <select id="resultLanguageSelect" class="language-select" aria-label="Language">
          <option value="ru">Русский</option>
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="card result-card">
        <p class="eyebrow" data-i18n="resultEyebrow"></p>
        <h1 data-i18n="resultTitle"></h1>

        <div id="finalWords" class="final-words"></div>

        <section class="result-section">
          <h2 data-i18n="summaryTitle"></h2>

          <div class="summary-grid">
            <div class="summary-card">
              <span class="summary-label" data-i18n="totalTimeLabel"></span>
              <strong id="totalDuration">—</strong>
            </div>

            <div class="summary-card">
              <span class="summary-label" data-i18n="slowestStageLabel"></span>
              <strong id="slowestStage">—</strong>
            </div>

            <div class="summary-card">
              <span class="summary-label" data-i18n="mostToggledStageLabel"></span>
              <strong id="mostToggledStage">—</strong>
            </div>
          </div>
        </section>

        <section class="result-section">
          <h2 data-i18n="analysisModeTitle"></h2>
          <p class="helper-text" data-i18n="analysisModeDescription"></p>

          <div id="analysisModeGrid" class="mode-grid">
            <button class="mode-card active" data-mode="reflection">
              <strong data-i18n="modeReflectionTitle"></strong>
              <span data-i18n="modeReflectionDescription"></span>
            </button>

            <button class="mode-card" data-mode="psychology">
              <strong data-i18n="modePsychologyTitle"></strong>
              <span data-i18n="modePsychologyDescription"></span>
            </button>

            <button class="mode-card" data-mode="relationship">
              <strong data-i18n="modeRelationshipTitle"></strong>
              <span data-i18n="modeRelationshipDescription"></span>
            </button>

            <button class="mode-card" data-mode="career">
              <strong data-i18n="modeCareerTitle"></strong>
              <span data-i18n="modeCareerDescription"></span>
            </button>

            <button class="mode-card" data-mode="literary">
              <strong data-i18n="modeLiteraryTitle"></strong>
              <span data-i18n="modeLiteraryDescription"></span>
            </button>
          </div>
        </section>

        <section class="result-section">
          <h2 data-i18n="promptTitle"></h2>
          <p class="helper-text" data-i18n="promptDescription"></p>

          <pre class="code-box"><code id="promptOutput"></code></pre>

          <button id="copyPromptBtn" class="btn secondary full" data-i18n="copyPromptButton"></button>
        </section>

        <section class="result-section">
          <details class="details-box" open>
            <summary data-i18n="jsonTitle"></summary>
            <p class="helper-text" data-i18n="jsonDescription"></p>

            <pre class="code-box"><code id="jsonOutput"></code></pre>

            <button id="copyJsonBtn" class="btn secondary full" data-i18n="copyJsonButton"></button>
          </details>
        </section>

        <section class="result-section">
          <details class="details-box">
            <summary data-i18n="timelineTitle"></summary>
            <p class="helper-text" data-i18n="timelineDescription"></p>

            <div id="timelineOutput" class="timeline-output"></div>
          </details>
        </section>

        <section class="result-section">
          <details class="details-box">
            <summary data-i18n="developerTitle"></summary>
            <p class="helper-text" data-i18n="developerDescription"></p>

            <pre class="code-box"><code id="developerOutput"></code></pre>
          </details>
        </section>

        <button id="copyAllBtn" class="btn primary full" data-i18n="copyAllButton"></button>
        <button id="restartBtn" class="btn ghost full" data-i18n="restartButton"></button>

        <p class="disclaimer" data-i18n="disclaimer"></p>
      </div>
    </section>

  </main>
</body>
</html>
